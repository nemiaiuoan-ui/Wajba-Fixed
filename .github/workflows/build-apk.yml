name: 🚀 Build Wajba APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🔑 Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze (non-bloquant)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: 🏗️ Build APK Debug
      - run: flutter clean
        run: flutter build apk --debug --no-tree-shake-icons

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wajba-client-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: ✅ Done
        run: echo "APK disponible dans Artifacts !"
